<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#f7f7f7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
<meta name="description" content="DinoGame.Az — Google Chrome dinozavr oyununun cilalanmış, mobil və masaüstü üçün uyğunlaşdırılmış versiyası. Yalnız HTML, CSS və JavaScript ilə hazırlanıb." />
<title>DinoGame.Az — Sonsuz Piksel Oyunu</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='%230b0f17'/%3E%3Crect x='13' y='3' width='9' height='9' fill='%234ecf7a'/%3E%3Crect x='13' y='2' width='2' height='1' fill='%232c8a52'/%3E%3Crect x='16' y='2' width='2' height='1' fill='%232c8a52'/%3E%3Crect x='19' y='2' width='2' height='1' fill='%232c8a52'/%3E%3Crect x='19' y='6' width='2' height='2' fill='%23ffffff'/%3E%3Crect x='20' y='7' width='1' height='1' fill='%230e1219'/%3E%3Crect x='6' y='11' width='14' height='6' fill='%234ecf7a'/%3E%3Crect x='2' y='12' width='6' height='4' fill='%234ecf7a'/%3E%3Crect x='9' y='17' width='3' height='5' fill='%234ecf7a'/%3E%3Crect x='15' y='17' width='3' height='5' fill='%234ecf7a'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage" id="stage">
    <header class="hud" aria-hidden="false">
      <div class="hud-left">
        <span class="badge" id="badge-best">REKORD <span id="best">00000</span></span>
      </div>
      <div class="hud-right">
        <span class="badge mono" id="score">00000</span>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="game" width="1200" height="360" aria-label="DinoGame.Az oyunu"></canvas>

      <div class="overlay" id="overlay" data-state="ready">
        <div class="overlay-card">
          <div class="logo" aria-label="DinoGame.Az">
            <span class="logo-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="40" height="40">
                <rect x="13" y="3"  width="9"  height="9"  fill="#4ecf7a"/>
                <rect x="13" y="2"  width="2"  height="1"  fill="#2c8a52"/>
                <rect x="16" y="2"  width="2"  height="1"  fill="#2c8a52"/>
                <rect x="19" y="2"  width="2"  height="1"  fill="#2c8a52"/>
                <rect x="19" y="6"  width="2"  height="2"  fill="#fff"/>
                <rect x="20" y="7"  width="1"  height="1"  fill="#0e1219"/>
                <rect x="17" y="10" width="4"  height="2"  fill="#0e1219"/>
                <rect x="6"  y="11" width="14" height="6"  fill="#4ecf7a"/>
                <rect x="2"  y="12" width="6"  height="4"  fill="#4ecf7a"/>
                <rect x="8"  y="14" width="11" height="2"  fill="#bdebc3"/>
                <rect x="9"  y="17" width="3"  height="5"  fill="#4ecf7a"/>
                <rect x="15" y="17" width="3"  height="5"  fill="#4ecf7a"/>
                <rect x="8"  y="21" width="5"  height="2"  fill="#ffd24d"/>
                <rect x="14" y="21" width="5"  height="2"  fill="#ffd24d"/>
              </svg>
            </span>
            <h1 class="title">DinoGame<span>.Az</span></h1>
          </div>
          <p class="subtitle" id="subtitle">Başlamaq üçün ekrana toxun, kliklə və ya <kbd>Space</kbd> düyməsini bas</p>
          <ul class="hints">
            <li><kbd>Space</kbd> / <kbd>↑</kbd> / Toxunma — Tullanmaq</li>
            <li><kbd>↓</kbd> / Aşağı sürüşdür — Əyilmək</li>
            <li><kbd>P</kbd> — Fasilə</li>
          </ul>
          <button class="btn" id="primary-btn" type="button">Başla</button>
        </div>
      </div>
    </div>

    <nav class="touch-bar" aria-label="Toxunma idarəetməsi">
      <button class="touch-btn" id="btn-jump" aria-label="Tullan">▲</button>
      <button class="touch-btn" id="btn-duck" aria-label="Əyil">▼</button>
    </nav>

    <footer class="foot">
      <button class="game-btn" id="btn-sound" type="button" aria-pressed="true">
        <span class="ic" aria-hidden="true">♪</span>
        <span class="lb">Səs</span>
      </button>
      <button class="game-btn" id="btn-pause" type="button">
        <span class="ic" aria-hidden="true">❚❚</span>
        <span class="lb">Fasilə</span>
      </button>
      <button class="game-btn game-btn--danger" id="btn-reset" type="button">
        <span class="ic" aria-hidden="true">⟲</span>
        <span class="lb">Rekord</span>
      </button>
    </footer>
  </main>

  <script src="game.js" defer></script>

  <!-- kofe.al — bir qəhvə al -->
  <a class="kofe-floating" href="https://kofe.al/@goshgarhasanov" target="_blank" rel="noopener noreferrer" aria-label="Bir qəhvə al — kofe.al">
    <span class="kofe-floating__emoji" aria-hidden="true">☕</span>
    <span class="kofe-floating__label">Bir qəhvə al</span>
  </a>
  <style>
    .kofe-floating{position:fixed;right:16px;bottom:16px;z-index:9999;display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:9999px;background:linear-gradient(135deg,#f5a64a 0%,#ff7d5a 100%);color:#1a0e08;text-decoration:none;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-weight:600;font-size:14px;letter-spacing:-0.01em;box-shadow:0 6px 18px rgba(255,125,90,.32),inset 0 1px 0 rgba(255,255,255,.18);transition:transform .2s cubic-bezier(.22,1,.36,1),box-shadow .2s ease,filter .15s ease}
    .kofe-floating:hover{transform:translateY(-2px);filter:brightness(1.06);box-shadow:0 12px 28px rgba(255,125,90,.45),inset 0 1px 0 rgba(255,255,255,.22)}
    .kofe-floating:active{transform:translateY(0)}
    .kofe-floating__emoji{font-size:18px;line-height:1;animation:kofe-steam 3s ease-in-out infinite}
    @keyframes kofe-steam{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-1px) rotate(-3deg)}}
    @media (max-width:480px){.kofe-floating .kofe-floating__label{display:none}.kofe-floating{padding:12px}.kofe-floating__emoji{font-size:22px}}
  </style>
</body>
</html>
